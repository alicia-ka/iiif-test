<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G30495-02 IIIF annotations</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7f9;
      color: #1d2730;
    }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid #d7dee5;
      background: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      white-space: nowrap;
    }
    select, button {
      height: 34px;
      border: 1px solid #bac6d1;
      border-radius: 6px;
      background: #fff;
      color: #1d2730;
      font-size: 14px;
    }
    button { padding: 0 10px; cursor: pointer; }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      height: calc(100vh - 58px);
    }
    #viewer {
      min-height: 480px;
      background: #111820;
    }
    aside {
      overflow: auto;
      border-left: 1px solid #d7dee5;
      background: #ffffff;
    }
    .summary {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 14px 16px;
      border-bottom: 1px solid #e2e7ec;
      background: #ffffff;
      font-weight: 650;
    }
    .item {
      display: grid;
      gap: 6px;
      padding: 12px 16px;
      border-bottom: 1px solid #edf0f3;
      cursor: pointer;
    }
    .item:hover { background: #f3f7fb; }
    .tag {
      width: fit-content;
      padding: 2px 7px;
      border: 1px solid #a7c3dc;
      border-radius: 999px;
      color: #194d7a;
      background: #eef6fd;
      font-size: 12px;
      line-height: 1.4;
    }
    .text {
      font-size: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .overlay {
      border: 3px solid #ff3b30;
      background: rgba(255, 59, 48, .13);
      box-shadow: 0 0 0 1px rgba(255,255,255,.85);
      cursor: pointer;
    }
    .overlay.active {
      border-color: #00a3ff;
      background: rgba(0, 163, 255, .18);
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: minmax(360px, 62vh) auto; }
      aside { border-left: 0; border-top: 1px solid #d7dee5; }
      header { flex-wrap: wrap; }
      h1 { white-space: normal; }
    }
  </style>
</head>
<body>
  <header>
    <h1>G30495-02 annotations</h1>
    <button id="prev" type="button">Prev</button>
    <select id="page"></select>
    <button id="next" type="button">Next</button>
    <span id="status"></span>
  </header>
  <main>
    <div id="viewer"></div>
    <aside>
      <div class="summary" id="summary">Loading annotations...</div>
      <div id="list"></div>
    </aside>
  </main>
  <script>
    const manifestUrl = "manifest_G30495-02.json";
    const viewer = OpenSeadragon({
      id: "viewer",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
      showNavigator: true,
      gestureSettingsMouse: { clickToZoom: false }
    });
    let manifest;
    let canvases = [];
    let currentIndex = 0;
    let annotations = [];

    const pageSelect = document.querySelector("#page");
    const status = document.querySelector("#status");
    const summary = document.querySelector("#summary");
    const list = document.querySelector("#list");

    function pageLabel(canvas, index) {
      return canvas.label || `Page ${index + 1}`;
    }

    function parseXywh(on) {
      const match = String(on).match(/#xywh=(\d+),(\d+),(\d+),(\d+)/);
      return match ? match.slice(1).map(Number) : null;
    }

    async function loadAnnotations(canvas) {
      const refs = canvas.otherContent || [];
      const all = [];
      for (const ref of refs) {
        const response = await fetch(ref["@id"]);
        const data = await response.json();
        all.push(...(data.resources || []));
      }
      return all;
    }

    function clearOverlays() {
      viewer.clearOverlays();
      annotations = [];
      list.replaceChildren();
    }

    function focusAnnotation(index) {
      const annotation = annotations[index];
      if (!annotation) return;
      document.querySelectorAll(".overlay").forEach(el => el.classList.remove("active"));
      annotation.element.classList.add("active");
      viewer.viewport.fitBounds(annotation.rect, true);
    }

    async function showPage(index) {
      currentIndex = Math.max(0, Math.min(index, canvases.length - 1));
      const canvas = canvases[currentIndex];
      pageSelect.value = String(currentIndex);
      status.textContent = `${currentIndex + 1} / ${canvases.length}`;
      clearOverlays();
      const image = canvas.images[0].resource;
      const service = image.service["@id"];
      viewer.open(`${service}/info.json`);
      const pageAnnotations = await loadAnnotations(canvas);
      viewer.addOnceHandler("open", () => {
        pageAnnotations.forEach((anno, idx) => {
          const xywh = parseXywh(anno.on);
          if (!xywh) return;
          const [x, y, w, h] = xywh;
          const element = document.createElement("div");
          element.className = "overlay";
          element.title = anno.resource.chars;
          const rect = viewer.viewport.imageToViewportRectangle(x, y, w, h);
          viewer.addOverlay({ element, location: rect });
          annotations.push({ annotation: anno, element, rect });
          element.addEventListener("click", () => focusAnnotation(idx));
        });
        summary.textContent = `${pageLabel(canvas, currentIndex)}: ${annotations.length} annotations`;
        pageAnnotations.forEach((anno, idx) => {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `<span class="tag">${anno.label || "annotation"}</span><span class="text"></span>`;
          item.querySelector(".text").textContent = anno.resource.chars;
          item.addEventListener("click", () => focusAnnotation(idx));
          list.appendChild(item);
        });
      });
    }

    async function init() {
      const response = await fetch(manifestUrl);
      manifest = await response.json();
      canvases = manifest.sequences[0].canvases;
      canvases.forEach((canvas, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = pageLabel(canvas, index);
        pageSelect.appendChild(option);
      });
      pageSelect.addEventListener("change", event => showPage(Number(event.target.value)));
      document.querySelector("#prev").addEventListener("click", () => showPage(currentIndex - 1));
      document.querySelector("#next").addEventListener("click", () => showPage(currentIndex + 1));
      const firstAnnotated = canvases.findIndex(canvas => canvas.otherContent && canvas.otherContent.length);
      await showPage(firstAnnotated >= 0 ? firstAnnotated : 0);
    }

    init().catch(error => {
      summary.textContent = "Failed to load viewer";
      console.error(error);
    });
  </script>
</body>
</html>
