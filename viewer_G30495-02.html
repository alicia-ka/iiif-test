<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G30495-02 IIIF Annotation Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --panel: #f7f6f2;
      --ink: #252525;
      --muted: #66645f;
      --line: #d8d4c9;
      --accent: #355c7d;
      --selected: #1b4f72;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eeece5;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      min-height: 100vh;
    }
    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-right: 1px solid var(--line);
      background: #1f211f;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
      padding: 8px 12px;
      color: #f7f4ea;
      background: #2a2c2a;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .toolbar button, .toolbar select, .toolbar label {
      min-height: 34px;
      border: 1px solid rgba(255,255,255,0.28);
      color: #f8f5ed;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
    }
    .toolbar select {
      max-width: 220px;
    }
    .toolbar button {
      cursor: pointer;
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .toolbar input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #fbc956;
    }
    #viewer {
      width: 100%;
      height: calc(100vh - 52px);
      background: #151715;
    }
    .side {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-width: 0;
      background: var(--panel);
    }
    .side-head {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .search {
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fffdf8;
    }
    .search input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
      background: #fff;
    }
    .search-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding-top: 2px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #34322d;
    }
    .swatch {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      display: inline-block;
    }
    #list {
      overflow: auto;
      padding: 10px;
    }
    .item {
      width: 100%;
      margin: 0 0 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px;
      text-align: left;
      color: inherit;
      background: rgba(255,255,255,0.66);
      cursor: pointer;
      font: inherit;
    }
    .item:hover {
      border-color: #c8c1b2;
      background: #fff;
    }
    .item.selected {
      border-color: var(--selected);
      box-shadow: 0 0 0 2px rgba(27,79,114,0.16);
      background: #fff;
    }
    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }
    .type {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      font-weight: 700;
      color: #30302c;
    }
    .text {
      overflow-wrap: anywhere;
      font-size: 14px;
      line-height: 1.38;
    }
    .volume {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .anno-overlay {
      cursor: pointer;
      mix-blend-mode: multiply;
      border: 0;
      outline: 0 solid transparent;
      transition: outline-width 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }
    .anno-overlay.selected {
      outline: 3px solid rgba(27,79,114,0.86);
      box-shadow: 0 0 0 5px rgba(255,255,255,0.55);
      mix-blend-mode: normal;
    }
    .anno-overlay.hidden {
      display: none !important;
    }
    .empty {
      color: var(--muted);
      padding: 18px 10px;
      font-size: 14px;
    }
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 58vh 42vh;
      }
      .stage {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      #viewer {
        height: calc(58vh - 52px);
      }
      .side {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage">
      <div class="toolbar">
        <button id="prev" type="button" title="Previous page">‹</button>
        <select id="pageSelect" title="Page"></select>
        <button id="next" type="button" title="Next page">›</button>
        <label title="Show or hide annotation overlays">
          <input id="toggleAnnotations" type="checkbox" checked>
          Overlays
        </label>
      </div>
      <div id="viewer"></div>
    </section>
    <aside class="side">
      <div class="side-head">
        <h1>G30495-02 Annotations</h1>
        <div class="meta" id="pageMeta">Loading manifest and annotations…</div>
      </div>
      <div class="search">
        <input id="searchBox" type="search" placeholder="Search all annotations">
        <div class="search-row">
          <span id="resultCount">annotations_index JSON</span>
          <span id="status"></span>
        </div>
        <div class="legend" id="legend"></div>
      </div>
      <div id="list"></div>
    </aside>
  </main>
  <script>
    const MANIFEST_URL = "manifest_G30495-02.json";
    const INDEX_URL = "annotations_index_G30495-02.json";
    const COLORS = {
  "gūsa": "#E6DACC",
  "name": "#54B5E2",
  "inline_name": "#adcbdc",
  "location": "#1ED72C",
  "hala": "#A935FF",
  "title": "#BAA992",
  "group": "#F6B06E",
  "text": "#FBC956"
};
    const OPACITY = {
  "default": 0.34,
  "title": 0.58,
  "text": 0.58,
  "gūsa": 0.99,
  "inline_name": 0.8
};
    let manifest;
    let annotations = [];
    let canvases = [];
    let currentPageIndex = 0;
    let selectedId = null;
    let searchTerm = "";
    let overlaysVisible = true;
    const overlayById = new Map();

    const viewer = OpenSeadragon({
      id: "viewer",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
      showNavigator: true,
      preserveViewport: false,
      animationTime: 0.25,
      gestureSettingsMouse: { clickToZoom: false },
      gestureSettingsTouch: { pinchToZoom: true, clickToZoom: false }
    });

    const pageSelect = document.getElementById("pageSelect");
    const list = document.getElementById("list");
    const pageMeta = document.getElementById("pageMeta");
    const resultCount = document.getElementById("resultCount");
    const status = document.getElementById("status");
    const searchBox = document.getElementById("searchBox");
    const toggleAnnotations = document.getElementById("toggleAnnotations");

    function canvasLabel(canvas) {
      const label = canvas.label;
      if (typeof label === "string") return label;
      if (label && label.none) return Array.isArray(label.none) ? label.none[0] : label.none;
      if (label && label.en) return Array.isArray(label.en) ? label.en[0] : label.en;
      return String(label || "");
    }

    function pageFromLabel(label) {
      const match = String(label).match(/^\[(\d+)\]$/);
      return match ? Number(match[1]) : null;
    }

    function xywhParts(xywh) {
      return xywh.replace("xywh=", "").split(",").map(Number);
    }

    function tileSourceFor(canvas) {
      const resource = canvas.images?.[0]?.resource || {};
      const service = Array.isArray(resource.service) ? resource.service[0] : resource.service;
      if (service && service["@id"]) return service["@id"].replace(/\/$/, "") + "/info.json";
      return { type: "image", url: resource["@id"] || resource.id };
    }

    function annotationsForCurrentPage() {
      const page = pageFromLabel(canvasLabel(canvases[currentPageIndex]));
      return annotations.filter(item => item.page === page);
    }

    function filteredAnnotations() {
      const q = searchTerm.trim().toLocaleLowerCase();
      if (!q) return annotationsForCurrentPage();
      return annotations.filter(item => [
        item.text,
        item.type,
        item.volume,
        item.sourceVolume,
        String(item.page),
        String(item.sourceRow)
      ].join(" ").toLocaleLowerCase().includes(q));
    }

    function renderLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "";
      Object.entries(COLORS).forEach(([key, color]) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.innerHTML = `<span class="swatch" style="background:${color}; opacity:${OPACITY[key] || OPACITY.default}"></span>${key}`;
        legend.appendChild(chip);
      });
    }

    function loadPage(index, pendingSelectionId = null) {
      currentPageIndex = Math.max(0, Math.min(canvases.length - 1, index));
      const canvas = canvases[currentPageIndex];
      pageSelect.value = String(currentPageIndex);
      pageMeta.textContent = `${canvasLabel(canvas)} · ${annotationsForCurrentPage().length} annotations`;
      overlayById.clear();
      viewer.clearOverlays();
      viewer.open(tileSourceFor(canvas));
      viewer.addOnceHandler("open", () => {
        renderOverlays();
        renderList();
        if (pendingSelectionId) selectAnnotation(pendingSelectionId, { scrollList: true });
      });
    }

    function renderOverlays() {
      annotationsForCurrentPage().forEach(item => {
        const [x, y, w, h] = xywhParts(item.xywh);
        const el = document.createElement("div");
        el.className = "anno-overlay";
        el.dataset.id = item.id;
        el.title = `${item.type} · Page ${item.page} · No. ${item.sourceRow}`;
        el.style.backgroundColor = item.color || COLORS[item.type] || COLORS.name;
        el.style.opacity = String(item.opacity || OPACITY[item.type] || OPACITY.default);
        if (!overlaysVisible) el.classList.add("hidden");
        viewer.addOverlay({
          element: el,
          location: viewer.viewport.imageToViewportRectangle(x, y, w, h),
          checkResize: false
        });
        new OpenSeadragon.MouseTracker({
          element: el,
          pressHandler: event => { event.preventDefaultAction = true; },
          dragHandler: event => { event.preventDefaultAction = true; },
          clickHandler: event => {
            event.preventDefaultAction = true;
            selectAnnotation(item.id, { scrollList: true });
          }
        }).setTracking(true);
        overlayById.set(item.id, el);
      });
      updateSelectionClasses();
    }

    function renderList() {
      const items = filteredAnnotations();
      list.innerHTML = "";
      const page = pageFromLabel(canvasLabel(canvases[currentPageIndex]));
      resultCount.textContent = searchTerm.trim()
        ? `${items.length} global matches from annotations_index`
        : `${items.length} annotations on page ${page}`;
      status.textContent = searchTerm.trim() ? "" : "current page";
      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matching annotations.";
        list.appendChild(empty);
        return;
      }
      items.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "item";
        button.dataset.id = item.id;
        button.innerHTML = `
          <div class="item-top">
            <span>Page ${item.page} · No. ${item.sourceRow}</span>
            <span class="type"><span class="swatch" style="background:${item.color}; opacity:${item.opacity}"></span>${item.type}</span>
          </div>
          <div class="text"></div>
          <div class="volume">Volume: ${item.volume || "—"} · Source: ${item.sourceVolume || "—"}</div>
        `;
        button.querySelector(".text").textContent = item.text;
        button.addEventListener("click", event => {
          event.preventDefault();
          const targetIndex = canvases.findIndex(canvas => pageFromLabel(canvasLabel(canvas)) === item.page);
          if (targetIndex !== currentPageIndex && targetIndex >= 0) {
            loadPage(targetIndex, item.id);
          } else {
            selectAnnotation(item.id, { scrollList: false });
          }
        });
        list.appendChild(button);
      });
      updateSelectionClasses();
    }

    function selectAnnotation(id, options = {}) {
      selectedId = id;
      updateSelectionClasses();
      if (options.scrollList) {
        let item = list.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if (!item && searchTerm.trim()) {
          searchTerm = "";
          searchBox.value = "";
          renderList();
          item = list.querySelector(`[data-id="${CSS.escape(id)}"]`);
        }
        if (item) item.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    }

    function updateSelectionClasses() {
      overlayById.forEach((el, id) => {
        el.classList.toggle("selected", id === selectedId);
      });
      list.querySelectorAll(".item").forEach(item => {
        item.classList.toggle("selected", item.dataset.id === selectedId);
      });
    }

    function setupPages() {
      pageSelect.innerHTML = "";
      canvases.forEach((canvas, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = canvasLabel(canvas);
        pageSelect.appendChild(option);
      });
      const firstAnnotated = canvases.findIndex(canvas =>
        annotations.some(item => item.canvasLabel === canvasLabel(canvas))
      );
      loadPage(firstAnnotated >= 0 ? firstAnnotated : 0);
    }

    document.getElementById("prev").addEventListener("click", () => loadPage(currentPageIndex - 1));
    document.getElementById("next").addEventListener("click", () => loadPage(currentPageIndex + 1));
    pageSelect.addEventListener("change", () => loadPage(Number(pageSelect.value)));
    searchBox.addEventListener("input", () => {
      searchTerm = searchBox.value;
      renderList();
    });
    searchBox.addEventListener("search", () => {
      searchTerm = searchBox.value;
      renderList();
    });
    searchBox.addEventListener("change", () => {
      searchTerm = searchBox.value;
      renderList();
    });
    toggleAnnotations.addEventListener("change", () => {
      overlaysVisible = toggleAnnotations.checked;
      overlayById.forEach(el => el.classList.toggle("hidden", !overlaysVisible));
    });

    async function init() {
      renderLegend();
      const [manifestResponse, indexResponse] = await Promise.all([
        fetch(MANIFEST_URL),
        fetch(INDEX_URL)
      ]);
      manifest = await manifestResponse.json();
      annotations = await indexResponse.json();
      canvases = manifest.sequences[0].canvases;
      setupPages();
    }

    init().catch(error => {
      console.error(error);
      pageMeta.textContent = "Unable to load viewer files.";
      status.textContent = error.message;
    });
  </script>
</body>
</html>
